<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>映緹影像 · 拍攝預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#2D4F45;--g2:#3d6b5f;--g3:#1e342d;--o:#C85A2A;--o2:#e0703f;--cr:#F4EFE6;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cr);min-height:100vh;color:#333;}
.site-header{background:var(--g);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo-mark{display:flex;align-items:center;gap:12px;}
.logo-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--cr);display:flex;align-items:center;justify-content:center;}
.logo-inner{width:14px;height:14px;border-radius:50%;background:var(--cr);opacity:.45}
.site-name{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--cr);letter-spacing:.06em}
.site-tagline{font-size:11px;color:#8ab3a8;letter-spacing:.08em}
.hero{text-align:center;padding:52px 24px 36px;}
.hero-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:400;color:var(--g3);letter-spacing:.08em;margin-bottom:10px;}
.hero-sub{font-size:13px;color:#777;letter-spacing:.04em;line-height:1.8}
.container{max-width:640px;margin:0 auto;padding:0 20px 60px;}
.card{background:white;border-radius:14px;border:1.5px solid #c5d8d3;margin-bottom:16px;overflow:hidden;}
.card-head{background:var(--g);padding:12px 20px;display:flex;align-items:center;gap:10px;}
.step-circle{width:24px;height:24px;border-radius:50%;background:var(--o);color:white;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-head-title{font-size:13px;font-weight:500;color:var(--cr);letter-spacing:.04em}
.card-body{padding:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{background:var(--g);color:var(--cr);border:none;border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:18px;line-height:1;}
.cal-nav button:hover{background:var(--g2)}
.month-lbl{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:400;color:var(--g3)}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.wdlbl{font-size:11px;text-align:center;color:var(--g);padding:4px 0;font-weight:500}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dc{border-radius:7px;height:38px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#aaa;cursor:default;border:1.5px solid transparent;background:#f7f7f7;transition:all .15s;}
.dc.avail{cursor:pointer;color:var(--g3);background:#eaf3f0;border-color:#b8d8d2}
.dc.avail:hover{background:var(--g);color:var(--cr);border-color:var(--g)}
.dc.selected{background:var(--g);color:var(--cr);border-color:var(--g);font-weight:500}
.dc.past{color:#ccc;background:#f5f5f5}
.dc.empty{background:transparent;border-color:transparent}
.dc.today-mark{border-color:var(--o)}
.notice{background:#fff8f4;border:1.5px solid #e0a080;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#7a3b1e;line-height:1.7;}
.hint{font-size:12px;color:var(--g);margin-bottom:10px;}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.slot-btn{border:1.5px solid #b8d8d2;border-radius:9px;padding:10px 8px;font-size:13px;background:white;color:var(--g3);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s;}
.slot-btn:hover{background:#eaf3f0;border-color:var(--g)}
.slot-btn.sel{background:var(--o);border-color:var(--o);color:white;font-weight:500}
.slot-btn.booked{background:#f0f0f0;border-color:#ddd;color:#bbb;cursor:not-allowed;text-decoration:line-through;font-size:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:500;color:var(--g);letter-spacing:.03em}
.fg input{border:1.5px solid #c5d8d3;border-radius:8px;padding:9px 12px;font-size:13px;background:white;font-family:inherit;color:#333;outline:none;transition:border-color .15s;}
.fg input:focus{border-color:var(--g)}
.summary{background:#eaf3f0;border:1.5px solid var(--g);border-radius:9px;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--g3);line-height:1.8;}
.summary strong{font-weight:500}
.submit-btn{width:100%;background:var(--o);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;margin-top:20px;font-family:inherit;letter-spacing:.06em;transition:background .15s;}
.submit-btn:hover{background:var(--o2)}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.success{text-align:center;padding:40px 24px;display:none;}
.success-icon{width:56px;height:56px;border-radius:50%;background:var(--g);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.success-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--g3);margin-bottom:10px;}
.success-msg{font-size:13px;color:#666;line-height:1.9}
.reset-btn{margin-top:20px;background:var(--g);color:var(--cr);border:none;border-radius:8px;padding:11px 28px;font-size:14px;cursor:pointer;font-family:inherit;}
.reset-btn:hover{background:var(--g2)}
.site-footer{background:var(--g3);color:#8ab3a8;text-align:center;padding:20px;font-size:12px;letter-spacing:.04em;}
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .site-header{padding:0 16px}
  .hero{padding:36px 16px 24px}
  .hero-title{font-size:20px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-mark">
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <div><div class="site-name">映緹影像</div></div>
  </div>
  <div class="site-tagline">YINGDI PHOTOGRAPHY</div>
</header>

<div class="hero">
  <div class="hero-title">拍攝時段預約</div>
  <div class="hero-sub">選擇你喜歡的日期與時段，填寫資料後送出<br>我們將盡快與你聯繫確認細節</div>
</div>

<div class="container">
  <input type="hidden" id="sheetUrl" value="https://script.google.com/macros/s/AKfycbytkRUXIcfOH9dm3Ler42FB-5In20n8d8gqHGR_WfWHFBxH7PtRmcuyHbJWLKIfHqhX/exec" />

  <div id="bookingFlow">

    <div class="card">
      <div class="card-head"><div class="step-circle">1</div><div class="card-head-title">選擇拍攝日期</div></div>
      <div class="card-body">
        <div class="cal-nav">
          <button onclick="chgM(-1)">&#8249;</button>
          <div class="month-lbl" id="mLbl"></div>
          <button onclick="chgM(1)">&#8250;</button>
        </div>
        <div class="weekrow">
          <div class="wdlbl">日</div><div class="wdlbl">一</div><div class="wdlbl">二</div>
          <div class="wdlbl">三</div><div class="wdlbl">四</div><div class="wdlbl">五</div><div class="wdlbl">六</div>
        </div>
        <div class="daygrid" id="daygrid"></div>
      </div>
    </div>

    <div class="card" id="slotCard" style="display:none">
      <div class="card-head"><div class="step-circle">2</div><div class="card-head-title">選擇拍攝時段</div></div>
      <div class="card-body">
        <div class="notice">請仔細確認欲預約的時段，時段一經送出即完成預約，請勿隨意更動，確認無誤後再進行預約。</div>
        <div class="hint">可選擇連續時段，最多 4 個時段（共 8 小時）</div>
        <div class="slots-grid" id="slotsgrid"></div>
      </div>
    </div>

    <div class="card" id="formCard" style="display:none">
      <div class="card-head"><div class="step-circle">3</div><div class="card-head-title">填寫預約資料</div></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="fg"><label>姓名 *</label><input type="text" id="fName" placeholder="你的名字"></div>
          <div class="fg"><label>聯絡電話 *</label><input type="tel" id="fPhone" placeholder="0912-345-678"></div>
        </div>
        <div class="summary" id="summaryBox" style="display:none"></div>
        <button class="submit-btn" id="submitBtn" onclick="doSubmit()">確認送出預約</button>
      </div>
    </div>

  </div>

  <div class="success" id="successBox">
    <div class="success-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F4EFE6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">預約已送出！</div>
    <div class="success-msg" id="successMsg"></div>
    <button class="reset-btn" onclick="resetForm()">再預約一次</button>
  </div>
</div>

<footer class="site-footer">
  © 映緹影像 YINGDI PHOTOGRAPHY &nbsp;·&nbsp; 保留一切權利
</footer>

<script>
const SLOTS=['09:00 – 11:00','11:00 – 13:00','14:00 – 16:00','16:00 – 18:00','18:00 – 20:00'];
const BOOKED={};
let cy=new Date().getFullYear(),cm=new Date().getMonth();
let selDate=null,selSlots=[];

function loadBooked(){
  const url=document.getElementById('sheetUrl').value.trim();
  if(!url)return;
  const old=document.getElementById('_jsonp');
  if(old)old.remove();
  window.__bc=function(list){
    Object.keys(BOOKED).forEach(k=>delete BOOKED[k]);
    list.forEach(k=>{BOOKED[k]=true;});
    if(selDate)renderSlots();
  };
  const s=document.createElement('script');
  s.id='_jsonp';
  s.src=url+'?callback=__bc&t='+Date.now();
  document.body.appendChild(s);
}

function chgM(d){
  cm+=d;
  if(cm>11){cm=0;cy++}
  if(cm<0){cm=11;cy--}
  renderCal();
}

function renderCal(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mLbl').textContent=cy+' / '+mn[cm];
  const grid=document.getElementById('daygrid');grid.innerHTML='';
  const first=new Date(cy,cm,1).getDay();
  const days=new Date(cy,cm+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='dc empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const dt=new Date(cy,cm,d);
    const dStr=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el=document.createElement('div');
    if(dt<today){el.className='dc past';}
    else{
      let cls='dc avail';
      if(selDate===dStr)cls+=' selected';
      if(dt.getTime()===today.getTime())cls+=' today-mark';
      el.className=cls;
      el.onclick=()=>pickDate(dStr);
    }
    el.textContent=d;
    grid.appendChild(el);
  }
}

function pickDate(ds){
  selDate=ds;selSlots=[];
  renderCal();
  renderSlots();
  document.getElementById('slotCard').style.display='block';
  document.getElementById('formCard').style.display='none';
  document.getElementById('summaryBox').style.display='none';
  document.getElementById('slotCard').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderSlots(){
  const sg=document.getElementById('slotsgrid');sg.innerHTML='';
  SLOTS.forEach((s,i)=>{
    const k=selDate+'|'+s;
    const isBooked=BOOKED[k];
    const isSel=selSlots.includes(i);
    const btn=document.createElement('button');
    btn.className='slot-btn'+(isBooked?' booked':isSel?' sel':'');
    btn.textContent=isBooked?s+'（已預約）':s;
    if(!isBooked)btn.onclick=()=>toggleSlot(i);
    else btn.disabled=true;
    sg.appendChild(btn);
  });
}

function toggleSlot(idx){
  if(BOOKED[selDate+'|'+SLOTS[idx]])return;
  if(selSlots.includes(idx)){
    if(idx===selSlots[0])selSlots.shift();
    else if(idx===selSlots[selSlots.length-1])selSlots.pop();
    else selSlots=[idx];
  } else {
    if(selSlots.length===0){
      selSlots=[idx];
    } else {
      const min=selSlots[0],max=selSlots[selSlots.length-1];
      if(idx===min-1)selSlots.unshift(idx);
      else if(idx===max+1)selSlots.push(idx);
      else selSlots=[idx];
      if(selSlots.length>4)selSlots=selSlots.slice(0,4);
      for(let i=selSlots[0];i<=selSlots[selSlots.length-1];i++){
        if(BOOKED[selDate+'|'+SLOTS[i]]){selSlots=[idx];break;}
      }
    }
  }
  renderSlots();
  if(selSlots.length>0){
    document.getElementById('formCard').style.display='block';
    updateSummary();
    document.getElementById('formCard').scrollIntoView({behavior:'smooth',block:'nearest'});
  } else {
    document.getElementById('formCard').style.display='none';
  }
}

function updateSummary(){
  const sb=document.getElementById('summaryBox');
  if(selDate&&selSlots.length>0){
    const [y,m,d]=selDate.split('-');
    const first=SLOTS[selSlots[0]].split(' – ')[0];
    const last=SLOTS[selSlots[selSlots.length-1]].split(' – ')[1];
    const hrs=selSlots.length*2;
    sb.style.display='block';
    sb.innerHTML='<strong>預約摘要</strong><br>日期：'+y+' 年 '+parseInt(m)+' 月 '+parseInt(d)+' 日<br>時段：'+first+' – '+last+'　（共 '+hrs+' 小時）';
  }
}

async function doSubmit(){
  const name=document.getElementById('fName').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  if(!name||!phone){alert('請填寫姓名和聯絡電話');return;}
  if(!selDate||selSlots.length===0){alert('請選擇日期和時段');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='送出中…';
  const url=document.getElementById('sheetUrl').value.trim();
  const first=SLOTS[selSlots[0]].split(' – ')[0];
  const last=SLOTS[selSlots[selSlots.length-1]].split(' – ')[1];
  const slotStr=first+' – '+last+'（共 '+selSlots.length*2+' 小時）';
  const payload={name,phone,date:selDate,slot:slotStr};
  if(url){
    try{await fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});}
    catch(e){console.warn('送出失敗',e);}
  }
  selSlots.forEach(i=>{BOOKED[selDate+'|'+SLOTS[i]]=true;});
  const [y,m,d]=selDate.split('-');
  document.getElementById('bookingFlow').style.display='none';
  const box=document.getElementById('successBox');box.style.display='block';
  document.getElementById('successMsg').innerHTML='<strong>'+name+'</strong> 的預約已收到！<br>'+y+' 年 '+parseInt(m)+' 月 '+parseInt(d)+' 日<br>'+slotStr+'<br><br>映緹影像將盡快與你聯繫確認細節<br>期待與你的合作 ✦';
  box.scrollIntoView({behavior:'smooth'});
}

function resetForm(){
  selDate=null;selSlots=[];
  document.getElementById('successBox').style.display='none';
  document.getElementById('bookingFlow').style.display='block';
  document.getElementById('slotCard').style.display='none';
  document.getElementById('formCard').style.display='none';
  document.getElementById('summaryBox').style.display='none';
  ['fName','fPhone'].forEach(id=>document.getElementById(id).value='');
  const btn=document.getElementById('submitBtn');
  btn.disabled=false;btn.textContent='確認送出預約';
  renderCal();
  window.scrollTo({top:0,behavior:'smooth'});
}

renderCal();
window.addEventListener('load',function(){loadBooked();});
</script>
</body>
</html>
