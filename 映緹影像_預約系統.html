<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>映緹影像 · 拍攝預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#2D4F45;
  --g2:#3d6b5f;
  --g3:#1e342d;
  --o:#C85A2A;
  --o2:#e0703f;
  --cr:#F4EFE6;
  --cr2:#ede5d8;
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--cr);
  min-height:100vh;
  color:#333;
}

/* ── 頁首 ── */
.site-header{
  background:var(--g);
  padding:0 32px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo-mark{
  display:flex;align-items:center;gap:12px;
}
.logo-circle{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--cr);
  display:flex;align-items:center;justify-content:center;
}
.logo-inner{width:14px;height:14px;border-radius:50%;background:var(--cr);opacity:.45}
.site-name{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--cr);letter-spacing:.06em}
.site-tagline{font-size:11px;color:#8ab3a8;letter-spacing:.08em}

/* ── 主內容 ── */
.hero{
  text-align:center;
  padding:52px 24px 36px;
}
.hero-title{
  font-family:'Noto Serif TC',serif;
  font-size:26px;font-weight:400;
  color:var(--g3);
  letter-spacing:.08em;
  margin-bottom:10px;
}
.hero-sub{font-size:13px;color:#777;letter-spacing:.04em;line-height:1.8}

.container{
  max-width:640px;
  margin:0 auto;
  padding:0 20px 60px;
}

/* ── 設定框 ── */
.setup-panel{
  background:#fff8f4;
  border:1.5px dashed var(--o);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:24px;
}
.setup-panel p{font-size:12px;color:#7a3b1e;line-height:1.7;margin-bottom:8px}
.setup-panel label{font-size:11px;font-weight:500;color:var(--o);display:block;margin-bottom:4px}
.setup-panel input{
  width:100%;border:1.5px solid #e0a080;border-radius:6px;
  padding:8px 10px;font-size:12px;font-family:inherit;outline:none;background:white;
}
.setup-panel input:focus{border-color:var(--o)}

/* ── 卡片 ── */
.card{
  background:white;
  border-radius:14px;
  border:1.5px solid #c5d8d3;
  margin-bottom:16px;
  overflow:hidden;
}
.card-head{
  background:var(--g);
  padding:12px 20px;
  display:flex;align-items:center;gap:10px;
}
.step-circle{
  width:24px;height:24px;border-radius:50%;
  background:var(--o);color:white;
  font-size:12px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-head-title{font-size:13px;font-weight:500;color:var(--cr);letter-spacing:.04em}
.card-body{padding:20px}

/* ── 月曆 ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav button{
  background:var(--g);color:var(--cr);border:none;
  border-radius:6px;width:30px;height:30px;
  cursor:pointer;font-size:18px;line-height:1;
}
.cal-nav button:hover{background:var(--g2)}
.month-lbl{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:400;color:var(--g3)}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.wdlbl{font-size:11px;text-align:center;color:var(--g);padding:4px 0;font-weight:500}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dc{
  border-radius:7px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#aaa;
  cursor:default;border:1.5px solid transparent;
  background:#f7f7f7;transition:all .15s;
}
.dc.avail{cursor:pointer;color:var(--g3);background:#eaf3f0;border-color:#b8d8d2}
.dc.avail:hover{background:var(--g);color:var(--cr);border-color:var(--g)}
.dc.selected{background:var(--g);color:var(--cr);border-color:var(--g);font-weight:500}
.dc.past{color:#ccc;background:#f5f5f5}
.dc.empty{background:transparent;border-color:transparent}
.dc.today-mark{border-color:var(--o)}

/* ── 時段 ── */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.slot-btn{
  border:1.5px solid #b8d8d2;border-radius:9px;
  padding:10px 8px;font-size:13px;
  background:white;color:var(--g3);
  cursor:pointer;text-align:center;
  font-family:inherit;transition:all .15s;
}
.slot-btn:hover{background:#eaf3f0;border-color:var(--g)}
.slot-btn.sel{background:var(--o);border-color:var(--o);color:white;font-weight:500}
.slot-btn.booked{background:#f0f0f0;border-color:#ddd;color:#bbb;cursor:not-allowed;text-decoration:line-through;font-size:12px}

/* ── 表單 ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:12px;font-weight:500;color:var(--g);letter-spacing:.03em}
.fg input,.fg select,.fg textarea{
  border:1.5px solid #c5d8d3;border-radius:8px;
  padding:9px 12px;font-size:13px;
  background:white;font-family:inherit;color:#333;outline:none;
  transition:border-color .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg textarea{resize:vertical;min-height:72px}

/* ── 摘要 ── */
.summary{
  background:#eaf3f0;border:1.5px solid var(--g);border-radius:9px;
  padding:12px 16px;margin-top:16px;
  font-size:13px;color:var(--g3);line-height:1.8;
}
.summary strong{font-weight:500}

/* ── 送出按鈕 ── */
.submit-btn{
  width:100%;background:var(--o);color:white;border:none;
  border-radius:10px;padding:14px;font-size:15px;
  font-weight:500;cursor:pointer;margin-top:20px;
  font-family:inherit;letter-spacing:.06em;
  transition:background .15s;
}
.submit-btn:hover{background:var(--o2)}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}

/* ── 成功畫面 ── */
.success{
  text-align:center;padding:40px 24px;display:none;
}
.success-icon{
  width:56px;height:56px;border-radius:50%;background:var(--g);
  margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
}
.success-title{
  font-family:'Noto Serif TC',serif;font-size:20px;
  color:var(--g3);margin-bottom:10px;
}
.success-msg{font-size:13px;color:#666;line-height:1.9}
.reset-btn{
  margin-top:20px;background:var(--g);color:var(--cr);border:none;
  border-radius:8px;padding:11px 28px;font-size:14px;cursor:pointer;
  font-family:inherit;
}
.reset-btn:hover{background:var(--g2)}

/* ── 頁尾 ── */
.site-footer{
  background:var(--g3);color:#8ab3a8;
  text-align:center;padding:20px;font-size:12px;
  letter-spacing:.04em;
}

/* ── RWD ── */
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:auto}
  .site-header{padding:0 16px}
  .hero{padding:36px 16px 24px}
  .hero-title{font-size:20px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-mark">
    <div class="logo-circle"><div class="logo-inner"></div></div>
    <div>
      <div class="site-name">映緹影像</div>
    </div>
  </div>
  <div class="site-tagline">YINGDI PHOTOGRAPHY</div>
</header>

<div class="hero">
  <div class="hero-title">拍攝時段預約</div>
  <div class="hero-sub">選擇你喜歡的日期與時段，填寫資料後送出<br>我們將盡快與你聯繫確認細節</div>
</div>

<div class="container">

  <!-- ★ 攝影師設定區 ★ -->
  <div class="setup-panel" id="setupPanel">
    <label>攝影師設定：Google 試算表串接網址</label>
    <p>將 Google Apps Script 部署後的網址貼入此處，客戶預約資料即會自動寫入你的試算表。設定完成後可將此 HTML 直接分享給客戶使用。</p>
    <input type="text" id="sheetUrl" placeholder="https://script.google.com/macros/s/…/exec" oninput="onUrlInput()" />
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
      <button onclick="loadBooked()" style="background:var(--o);color:white;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit">載入預約狀態</button>
      <span id="loadStatus" style="font-size:12px;color:#999"></span>
    </div>
  </div>

  <div id="bookingFlow">

    <!-- 步驟一：日期 -->
    <div class="card">
      <div class="card-head">
        <div class="step-circle">1</div>
        <div class="card-head-title">選擇拍攝日期</div>
      </div>
      <div class="card-body">
        <div class="cal-nav">
          <button onclick="chgM(-1)">&#8249;</button>
          <div class="month-lbl" id="mLbl"></div>
          <button onclick="chgM(1)">&#8250;</button>
        </div>
        <div class="weekrow">
          <div class="wdlbl">日</div><div class="wdlbl">一</div><div class="wdlbl">二</div>
          <div class="wdlbl">三</div><div class="wdlbl">四</div><div class="wdlbl">五</div><div class="wdlbl">六</div>
        </div>
        <div class="daygrid" id="daygrid"></div>
      </div>
    </div>

    <!-- 步驟二：時段 -->
    <div class="card" id="slotCard" style="display:none">
      <div class="card-head">
        <div class="step-circle">2</div>
        <div class="card-head-title">選擇拍攝時段</div>
      </div>
      <div class="card-body">
        <div class="slots-grid" id="slotsgrid"></div>
      </div>
    </div>

    <!-- 步驟三：資料 -->
    <div class="card" id="formCard" style="display:none">
      <div class="card-head">
        <div class="step-circle">3</div>
        <div class="card-head-title">填寫預約資料</div>
      </div>
      <div class="card-body">
        <div class="form-grid">
          <div class="fg"><label>姓名 *</label><input type="text" id="fName" placeholder="你的名字"></div>
          <div class="fg"><label>聯絡電話 *</label><input type="tel" id="fPhone" placeholder="0912-345-678"></div>
        </div>
        <div class="summary" id="summaryBox" style="display:none"></div>
        <button class="submit-btn" id="submitBtn" onclick="doSubmit()">確認送出預約</button>
      </div>
    </div>

  </div><!-- /bookingFlow -->

  <!-- 成功畫面 -->
  <div class="success" id="successBox">
    <div class="success-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F4EFE6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">預約已送出！</div>
    <div class="success-msg" id="successMsg"></div>
    <button class="reset-btn" onclick="resetForm()">再預約一次</button>
  </div>

</div><!-- /container -->

<footer class="site-footer">
  © 映緹影像 YINGDI PHOTOGRAPHY &nbsp;·&nbsp; 保留一切權利
</footer>

<script>
// ══ 可自訂：開放時段 ══
const SLOTS = [
  '09:00 – 11:00',
  '11:00 – 13:00',
  '14:00 – 16:00',
  '16:00 – 18:00',
  '18:00 – 20:00'
];

const BOOKED = {};
let cy = new Date().getFullYear(), cm = new Date().getMonth();
let selDate = null, selSlot = null;

function onUrlInput(){
  document.getElementById('loadStatus').textContent = '';
}

async function loadBooked(){
  const url = document.getElementById('sheetUrl').value.trim();
  if(!url){ alert('請先貼上 Apps Script 網址'); return; }
  const statusEl = document.getElementById('loadStatus');
  statusEl.style.color = '#999';
  statusEl.textContent = '載入中…';
  try{
    const res = await fetch(url + '?t=' + Date.now());
    const list = await res.json();
    Object.keys(BOOKED).forEach(k => delete BOOKED[k]);
    list.forEach(k => { BOOKED[k] = true; });
    statusEl.textContent = '已載入，共 ' + list.length + ' 筆已預約';
    statusEl.style.color = '#2D4F45';
    if(selDate) pickDate(selDate);
  } catch(e){
    statusEl.textContent = '連線失敗，請確認網址';
    statusEl.style.color = '#C85A2A';
  }
}

function chgM(d){
  cm += d;
  if(cm > 11){cm = 0; cy++}
  if(cm < 0){cm = 11; cy--}
  renderCal();
}

function renderCal(){
  const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mLbl').textContent = cy + ' / ' + mn[cm];
  const grid = document.getElementById('daygrid'); grid.innerHTML = '';
  const first = new Date(cy, cm, 1).getDay();
  const days  = new Date(cy, cm+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for(let i = 0; i < first; i++){
    const e = document.createElement('div'); e.className='dc empty'; grid.appendChild(e);
  }
  for(let d = 1; d <= days; d++){
    const dt   = new Date(cy, cm, d);
    const dStr = cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const el   = document.createElement('div');
    if(dt < today){
      el.className = 'dc past';
    } else {
      let cls = 'dc avail';
      if(selDate === dStr) cls += ' selected';
      const isToday = dt.getTime() === today.getTime();
      if(isToday) cls += ' today-mark';
      el.className = cls;
      el.onclick = () => pickDate(dStr);
    }
    el.textContent = d;
    grid.appendChild(el);
  }
}

function pickDate(ds){
  selDate = ds; selSlot = null;
  renderCal();
  const sg = document.getElementById('slotsgrid'); sg.innerHTML='';
  SLOTS.forEach(s => {
    const k = ds + '|' + s;
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (BOOKED[k] ? ' booked' : '');
    btn.textContent = BOOKED[k] ? s + '（已預約）' : s;
    if(!BOOKED[k]) btn.onclick = () => pickSlot(s, btn);
    else btn.disabled = true;
    sg.appendChild(btn);
  });
  document.getElementById('slotCard').style.display = 'block';
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('summaryBox').style.display = 'none';
  selSlot = null;
  slotCard.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function pickSlot(s, el){
  selSlot = s;
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('formCard').style.display = 'block';
  updateSummary();
  document.getElementById('formCard').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function updateSummary(){
  const sb = document.getElementById('summaryBox');
  if(selDate && selSlot){
    const [y,m,d] = selDate.split('-');
    sb.style.display = 'block';
    sb.innerHTML = '<strong>預約摘要</strong><br>' +
      '日期：' + y + ' 年 ' + parseInt(m) + ' 月 ' + parseInt(d) + ' 日<br>' +
      '時段：' + selSlot;
  }
}

async function doSubmit(){
  const name  = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  if(!name || !phone){ alert('請填寫姓名和聯絡電話'); return; }
  if(!selDate || !selSlot){ alert('請選擇日期和時段'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';

  const url = document.getElementById('sheetUrl').value.trim();
  const payload = {
    name, phone,
    date : selDate,
    slot : selSlot
  };

  if(url){
    try{
      await fetch(url, {method:'POST', mode:'no-cors', body: JSON.stringify(payload)});
    } catch(e){ console.warn('試算表送出失敗', e); }
  }

  BOOKED[selDate + '|' + selSlot] = true;
  document.getElementById('loadStatus').textContent = '已更新（含本次預約）';
  const [y,m,d] = selDate.split('-');
  document.getElementById('bookingFlow').style.display = 'none';
  document.getElementById('setupPanel').style.display = 'none';
  const box = document.getElementById('successBox'); box.style.display = 'block';
  document.getElementById('successMsg').innerHTML =
    '<strong>' + name + '</strong> 的預約已收到！<br>' +
    y + ' 年 ' + parseInt(m) + ' 月 ' + parseInt(d) + ' 日　' + selSlot + '<br><br>' +
    '映緹影像將盡快與你聯繫確認細節<br>期待與你的合作 ✦';
  box.scrollIntoView({behavior:'smooth'});
}

function resetForm(){
  selDate = null; selSlot = null;
  document.getElementById('successBox').style.display = 'none';
  document.getElementById('bookingFlow').style.display = 'block';
  document.getElementById('setupPanel').style.display = 'block';
  document.getElementById('slotCard').style.display = 'none';
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('summaryBox').style.display = 'none';
  ['fName','fPhone'].forEach(id => document.getElementById(id).value = '');
  const btn = document.getElementById('submitBtn');
  btn.disabled = false; btn.textContent = '確認送出預約';
  renderCal();
  window.scrollTo({top:0, behavior:'smooth'});
}

renderCal();
window.addEventListener('load', () => {
  const url = document.getElementById('sheetUrl').value.trim();
  if(url) loadBooked();
});
</script>
</body>
</html>
